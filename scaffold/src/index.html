<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Kinetik Project</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' blob:; worker-src 'self' blob:;" />
  <script type="importmap">
  {
    "imports": {
      "@kinetik/engine": "../node_modules/@kinetik/engine/index.js",
      "@kinetik/engine/globals.js": "../node_modules/@kinetik/engine/globals.js",
      "@kinetik/engine/scene.js": "../node_modules/@kinetik/engine/scene.js",
      "@kinetik/engine/input.js": "../node_modules/@kinetik/engine/input.js",
      "@kinetik/engine/physics.js": "../node_modules/@kinetik/engine/physics.js",
      "@kinetik/engine/levelLoader.js": "../node_modules/@kinetik/engine/levelLoader.js",
      "@kinetik/engine/game/bootstrap.js": "../node_modules/@kinetik/engine/scaffold/src/game/bootstrap.js",
      "@kinetik/engine/game/globals.js": "../node_modules/@kinetik/engine/scaffold/src/game/globals.js",
      "@kinetik/engine/game/ground.js": "../node_modules/@kinetik/engine/scaffold/src/game/ground.js",
      "@kinetik/engine/game/player.js": "../node_modules/@kinetik/engine/scaffold/src/game/player.js"
    }
  }
  </script>
  <script type="module" src="./main.js"></script>
  <style>
    html,
    body,
    canvas {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      display: block;
      background: #04060d;
      color: #fff;
      font-family: 'Courier New', monospace;
    }

    body {
      overscroll-behavior: none;
    }

    .hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 500;
    }

    #crosshair {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 16px;
      height: 16px;
      pointer-events: none;
      z-index: 600;
    }

    #crosshair::before,
    #crosshair::after {
      content: '';
      position: absolute;
      background: rgba(255, 255, 255, 0.9);
    }

    #crosshair::before {
      width: 2px;
      height: 100%;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
    }

    #crosshair::after {
      width: 100%;
      height: 2px;
      top: 50%;
      left: 0;
      transform: translateY(-50%);
    }

    #interact-tooltip {
      position: fixed;
      top: calc(50% + 18px);
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.9);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-align: center;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.15s ease;
      z-index: 600;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.95);
    }

    #interact-tooltip.visible {
      opacity: 1;
    }

    #level-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7);
      color: #c9ffd0;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      padding: 5px 14px;
      border-radius: 4px;
      border: 1px solid rgba(120, 220, 140, 0.25);
      pointer-events: none;
      z-index: 700;
      opacity: 0;
      transition: opacity 0.35s ease;
    }

    #level-toast.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="hud">
    <div id="crosshair"></div>
    <div id="interact-tooltip"></div>
    <div id="level-toast"></div>
  </div>
</body>
</html>
